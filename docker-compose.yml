# Produktion auf dem VPS:  docker compose up -d --build
# Voraussetzung: .env mit DATABASE_URI (postgres://…), PAYLOAD_SECRET, ADMIN_EMAIL, ADMIN_PASSWORD
services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000' # nur lokal — Caddy macht HTTPS davor
    environment:
      DATABASE_URI: postgres://luemobil:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD fehlt in .env}@postgres:5432/luemobil
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?PAYLOAD_SECRET fehlt in .env}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Beim ersten Start automatisch die Inhalte importieren (leere DB vorausgesetzt)
      SEED_ON_INIT: ${SEED_ON_INIT:-true}
      # Suchmaschinen während der Testphase aussperren
      SITE_NOINDEX: ${SITE_NOINDEX:-true}
      # E-Mail-Benachrichtigung an Redakteur:innen (ohne SMTP_HOST deaktiviert)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@swl-innovation.de}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-LüMobil Hilfecenter}
      # Jira-Anbindung (ohne die vier Pflichtwerte inaktiv)
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY:-}
      JIRA_ISSUE_TYPE: ${JIRA_ISSUE_TYPE:-Bug}
      JIRA_SET_PRIORITY: ${JIRA_SET_PRIORITY:-false}
    volumes:
      - media:/app/media
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: luemobil
      POSTGRES_USER: luemobil
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD fehlt in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U luemobil -d luemobil']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  media:
